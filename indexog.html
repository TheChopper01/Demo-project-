<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
</head>
<body>
	<h1 id="message">Hello World</h1>

  <img id="Neymar y Messi" src="Neymar y Messi .jpg" alt="My image" width="300">

  <button onclick="changeText()">Click Me</button>
  <button onclick="toggle()">Toggle status</button>
  <button onclick="increase()">increase</button>
  <button onclick="decrease()">decrease</button>
  <p id="status">OFF</p>
  <h1 id="count">counter</h1>

  <script>
    let isOn = false;
    function toggle() {
      if (isOn === false) {
        isOn = true;
        document.getElementById("status").textContent = "ON";
        document.body.style.backgroundColor = "black";
        document.body.style.color = "white";
      } else {
        isOn = false;
        document.getElementById("status").textContent = "OFF";
        document.body.style.backgroundColor = "white";
        document.body.style.color = "black";
      }
    }
  </script>

  <script>
    let count = 0;
    function increase() {
      count++;
      document.getElementById("count").textContent = count;
      if (count>15) {
      document.getElementById("count").textContent = "too much";
    }
    }

    function decrease() {
      count--;
      document.getElementById("count").textContent = count;
      if (count>15) {
      document.getElementById("count").textContent = count;
    }
    }
  </script>


  <script>
    function changeText() {
      document.getElementById("message").textContent = "Future Goat!";
      document.getElementById("Neymar y Messi").src = "gettyimages-2252387965.jpg";
  
    }
  </script>
  
  <script>
    function toggleDarkMode() {
      document.body.style.backgroundColor = "black";
      document.body.style.color = "white";
    }
    
  </script>
</body>
</html>
